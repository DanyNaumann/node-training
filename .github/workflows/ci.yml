name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Node 22 LTS : seule version supportée par toute la stack
        # (kysely, dép. de better-auth, exige >=22).
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # npm ci = install reproductible depuis package-lock.json.
      # Compile aussi better-sqlite3 (module natif).
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Les tests s'auto-configurent (global-setup : DB jetable, migrations
      # Better Auth + Drizzle). Pas besoin de secret réel en CI.
      - name: Test + coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
